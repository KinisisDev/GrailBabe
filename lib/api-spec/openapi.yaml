openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: GrailBabe API - collectibles portfolio tracker
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: profile
  - name: vault
  - name: grail
  - name: trades
  - name: forum
  - name: portfolio
  - name: dashboard
  - name: ai
  - name: billing
  - name: prices
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /me:
    get:
      operationId: getMe
      tags: [profile]
      summary: Current authenticated user profile + subscription
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MeResponse" }
    patch:
      operationId: updateMe
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }

  /vault:
    get:
      operationId: listVaultItems
      tags: [vault]
      parameters:
        - { name: category, in: query, schema: { type: string } }
        - { name: condition, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string, enum: [recent, value, name] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CollectionItem" }
    post:
      operationId: createVaultItem
      tags: [vault]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CollectionItemInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollectionItem" }

  /vault/{id}:
    get:
      operationId: getVaultItem
      tags: [vault]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollectionItemDetail" }
    patch:
      operationId: updateVaultItem
      tags: [vault]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CollectionItemUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollectionItem" }
    delete:
      operationId: deleteVaultItem
      tags: [vault]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  /vault/{id}/prices:
    get:
      operationId: getVaultItemPrices
      tags: [prices]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PriceSnapshot" }

  /grail:
    get:
      operationId: listGrails
      tags: [grail]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GrailItem" }
    post:
      operationId: createGrail
      tags: [grail]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GrailItemInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GrailItem" }

  /grail/{id}:
    patch:
      operationId: updateGrail
      tags: [grail]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GrailItemUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GrailItem" }
    delete:
      operationId: deleteGrail
      tags: [grail]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      parameters:
        - { name: category, in: query, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TradePost" }
    post:
      operationId: createTrade
      tags: [trades]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TradePostInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TradePost" }

  /trades/{id}:
    get:
      operationId: getTrade
      tags: [trades]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TradePost" }
    delete:
      operationId: deleteTrade
      tags: [trades]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  /posts:
    get:
      operationId: listPosts
      tags: [forum]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ForumPost" }
    post:
      operationId: createPost
      tags: [forum]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ForumPostInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForumPost" }

  /posts/{id}:
    get:
      operationId: getPost
      tags: [forum]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForumPostDetail" }

  /posts/{id}/replies:
    post:
      operationId: createReply
      tags: [forum]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplyInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForumReply" }

  /posts/{id}/react:
    post:
      operationId: reactPost
      tags: [forum]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReactionInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ForumPost" }

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [portfolio]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortfolioSummary" }

  /portfolio/by-category:
    get:
      operationId: getPortfolioByCategory
      tags: [portfolio]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CategoryBreakdown" }

  /portfolio/timeline:
    get:
      operationId: getPortfolioTimeline
      tags: [portfolio]
      parameters:
        - { name: range, in: query, schema: { type: string, enum: [7d, 30d, 90d, 1y, all] } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TimelinePoint" }

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

  /activity:
    get:
      operationId: getActivity
      tags: [dashboard]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ActivityEvent" }

  /ai/insights:
    post:
      operationId: getAiInsights
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiInsightsInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiInsightsResult" }
        "402":
          description: Premium required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiErrorResponse" }

  /ai/search:
    post:
      operationId: aiSearch
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AiSearchInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AiSearchResult" }
        "402":
          description: Premium required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiErrorResponse" }

  /billing/plans:
    get:
      operationId: listBillingPlans
      tags: [billing]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BillingPlan" }

  /billing/checkout:
    post:
      operationId: createCheckout
      tags: [billing]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckoutInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutSession" }

  /billing/portal:
    post:
      operationId: createBillingPortal
      tags: [billing]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckoutSession" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    ApiErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        code: { type: ["string", "null"] }

    UserProfile:
      type: object
      required: [id, displayName, tier, vaultCount, grailCount]
      properties:
        id: { type: string }
        displayName: { type: string }
        avatarUrl: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        tier: { type: string, enum: [free, premium] }
        vaultCount: { type: integer }
        grailCount: { type: integer }
        createdAt: { type: string, format: date-time }

    MeResponse:
      type: object
      required: [profile, subscription, limits]
      properties:
        profile: { $ref: "#/components/schemas/UserProfile" }
        subscription: { $ref: "#/components/schemas/SubscriptionInfo" }
        limits: { $ref: "#/components/schemas/PlanLimits" }

    SubscriptionInfo:
      type: object
      required: [tier, active]
      properties:
        tier: { type: string, enum: [free, premium] }
        active: { type: boolean }
        interval: { type: ["string", "null"], enum: [month, year, null] }
        currentPeriodEnd: { type: ["string", "null"], format: date-time }
        cancelAtPeriodEnd: { type: boolean }

    PlanLimits:
      type: object
      required: [vaultMax, grailMax, categoriesMax, aiEnabled, livePricing, scannerEnabled, csvEnabled]
      properties:
        vaultMax: { type: ["integer", "null"] }
        grailMax: { type: ["integer", "null"] }
        categoriesMax: { type: ["integer", "null"] }
        aiEnabled: { type: boolean }
        livePricing: { type: boolean }
        scannerEnabled: { type: boolean }
        csvEnabled: { type: boolean }

    ProfileUpdate:
      type: object
      properties:
        displayName: { type: string, minLength: 1 }
        avatarUrl: { type: string }
        bio: { type: string }

    CollectionItem:
      type: object
      required: [id, name, category, condition, photos, tags, createdAt, updatedAt]
      properties:
        id: { type: integer }
        name: { type: string }
        brand: { type: ["string", "null"] }
        category: { type: string }
        condition: { type: string, enum: [mint, near_mint, excellent, good, fair, poor] }
        purchasePrice: { type: ["number", "null"] }
        currentValue: { type: ["number", "null"] }
        purchaseDate: { type: ["string", "null"], format: date }
        notes: { type: ["string", "null"] }
        photos:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        sku: { type: ["string", "null"] }
        favorite: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CollectionItemDetail:
      type: object
      required: [item, priceHistory]
      properties:
        item: { $ref: "#/components/schemas/CollectionItem" }
        priceHistory:
          type: array
          items: { $ref: "#/components/schemas/PriceSnapshot" }

    CollectionItemInput:
      type: object
      required: [name, category, condition]
      properties:
        name: { type: string, minLength: 1 }
        brand: { type: string }
        category: { type: string, minLength: 1 }
        condition: { type: string, enum: [mint, near_mint, excellent, good, fair, poor] }
        purchasePrice: { type: number }
        currentValue: { type: number }
        purchaseDate: { type: string, format: date }
        notes: { type: string }
        photos:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        sku: { type: string }
        favorite: { type: boolean }

    CollectionItemUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        brand: { type: string }
        category: { type: string }
        condition: { type: string, enum: [mint, near_mint, excellent, good, fair, poor] }
        purchasePrice: { type: number }
        currentValue: { type: number }
        purchaseDate: { type: string, format: date }
        notes: { type: string }
        photos:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        sku: { type: string }
        favorite: { type: boolean }

    PriceSnapshot:
      type: object
      required: [id, price, source, recordedAt]
      properties:
        id: { type: integer }
        price: { type: number }
        source: { type: string }
        recordedAt: { type: string, format: date-time }

    GrailItem:
      type: object
      required: [id, name, category, priority, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
        targetPrice: { type: ["number", "null"] }
        notes: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        priority: { type: string, enum: [low, medium, high] }
        acquired: { type: boolean }
        createdAt: { type: string, format: date-time }

    GrailItemInput:
      type: object
      required: [name, category]
      properties:
        name: { type: string, minLength: 1 }
        category: { type: string, minLength: 1 }
        targetPrice: { type: number }
        notes: { type: string }
        imageUrl: { type: string }
        priority: { type: string, enum: [low, medium, high] }

    GrailItemUpdate:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        category: { type: string }
        targetPrice: { type: number }
        notes: { type: string }
        imageUrl: { type: string }
        priority: { type: string, enum: [low, medium, high] }
        acquired: { type: boolean }

    TradePost:
      type: object
      required: [id, userId, userName, title, category, condition, kind, createdAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        userName: { type: string }
        userAvatar: { type: ["string", "null"] }
        title: { type: string }
        description: { type: ["string", "null"] }
        category: { type: string }
        condition: { type: string }
        askingPrice: { type: ["number", "null"] }
        photos:
          type: array
          items: { type: string }
        kind: { type: string, enum: [trade, sell, buy] }
        wantedItems:
          type: array
          items: { type: string }
        status: { type: string, enum: [open, pending, closed] }
        createdAt: { type: string, format: date-time }

    TradePostInput:
      type: object
      required: [title, category, condition, kind]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string, minLength: 1 }
        condition: { type: string }
        askingPrice: { type: number }
        photos:
          type: array
          items: { type: string }
        kind: { type: string, enum: [trade, sell, buy] }
        wantedItems:
          type: array
          items: { type: string }

    ForumPost:
      type: object
      required: [id, userId, userName, title, body, replyCount, reactionCount, createdAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        userName: { type: string }
        userAvatar: { type: ["string", "null"] }
        title: { type: string }
        body: { type: string }
        category: { type: ["string", "null"] }
        replyCount: { type: integer }
        reactionCount: { type: integer }
        userReaction: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }

    ForumPostDetail:
      type: object
      required: [post, replies]
      properties:
        post: { $ref: "#/components/schemas/ForumPost" }
        replies:
          type: array
          items: { $ref: "#/components/schemas/ForumReply" }

    ForumReply:
      type: object
      required: [id, postId, userId, userName, body, createdAt]
      properties:
        id: { type: integer }
        postId: { type: integer }
        userId: { type: string }
        userName: { type: string }
        userAvatar: { type: ["string", "null"] }
        body: { type: string }
        createdAt: { type: string, format: date-time }

    ForumPostInput:
      type: object
      required: [title, body]
      properties:
        title: { type: string, minLength: 1 }
        body: { type: string, minLength: 1 }
        category: { type: string }

    ReplyInput:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }

    ReactionInput:
      type: object
      required: [reaction]
      properties:
        reaction: { type: string, enum: [fire, heart, eyes, clap, none] }

    PortfolioSummary:
      type: object
      required: [totalValue, totalCost, gain, gainPct, itemCount, topCategory]
      properties:
        totalValue: { type: number }
        totalCost: { type: number }
        gain: { type: number }
        gainPct: { type: number }
        itemCount: { type: integer }
        topCategory: { type: ["string", "null"] }
        bestPerformer: { $ref: "#/components/schemas/CollectionItem" }
        worstPerformer: { $ref: "#/components/schemas/CollectionItem" }

    CategoryBreakdown:
      type: object
      required: [category, itemCount, value, costBasis]
      properties:
        category: { type: string }
        itemCount: { type: integer }
        value: { type: number }
        costBasis: { type: number }

    TimelinePoint:
      type: object
      required: [date, value]
      properties:
        date: { type: string, format: date }
        value: { type: number }

    DashboardSummary:
      type: object
      required: [portfolio, recentItems, topGrails, hotTrades, activity]
      properties:
        portfolio: { $ref: "#/components/schemas/PortfolioSummary" }
        recentItems:
          type: array
          items: { $ref: "#/components/schemas/CollectionItem" }
        topGrails:
          type: array
          items: { $ref: "#/components/schemas/GrailItem" }
        hotTrades:
          type: array
          items: { $ref: "#/components/schemas/TradePost" }
        activity:
          type: array
          items: { $ref: "#/components/schemas/ActivityEvent" }

    ActivityEvent:
      type: object
      required: [id, kind, message, createdAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [vault_add, vault_update, grail_add, grail_acquired, trade_post, price_change, forum_post] }
        message: { type: string }
        itemId: { type: ["integer", "null"] }
        createdAt: { type: string, format: date-time }

    AiInsightsInput:
      type: object
      properties:
        focus: { type: string, enum: [overview, opportunities, risks, valuation] }

    AiInsightsResult:
      type: object
      required: [summary, highlights, generatedAt]
      properties:
        summary: { type: string }
        highlights:
          type: array
          items: { $ref: "#/components/schemas/AiHighlight" }
        generatedAt: { type: string, format: date-time }

    AiHighlight:
      type: object
      required: [title, body, sentiment]
      properties:
        title: { type: string }
        body: { type: string }
        sentiment: { type: string, enum: [positive, neutral, warning] }
        itemId: { type: ["integer", "null"] }

    AiSearchInput:
      type: object
      required: [query]
      properties:
        query: { type: string, minLength: 1 }

    AiSearchResult:
      type: object
      required: [interpretation, results]
      properties:
        interpretation: { type: string }
        results:
          type: array
          items: { $ref: "#/components/schemas/CollectionItem" }

    BillingPlan:
      type: object
      required: [id, name, tier, priceCents, interval, features]
      properties:
        id: { type: string }
        name: { type: string }
        tier: { type: string, enum: [free, premium] }
        priceCents: { type: integer }
        interval: { type: string, enum: [month, year, none] }
        features:
          type: array
          items: { type: string }

    CheckoutInput:
      type: object
      required: [planId]
      properties:
        planId: { type: string }

    CheckoutSession:
      type: object
      required: [url]
      properties:
        url: { type: string }
