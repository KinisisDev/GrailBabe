name: Deploy API to Azure Container Apps (Prod)

# Triggered by:
#   - Pushing a git tag matching v* (e.g. v1.0.0)
#   - Manual workflow_dispatch (lets you re-promote a specific dev image SHA)
#
# Re-uses the dev image: same binary that was tested in dev is promoted to prod.
# Requires the GitHub Environment "production" to exist with required reviewers
# so a human approves every prod deploy.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dev_sha:
        description: 'Dev image SHA to promote (full git SHA). Leave blank to use the current commit SHA.'
        required: false
        default: ''

env:
  REGISTRY: acrgrailbabedevdev.azurecr.io
  IMAGE_NAME: grailbabe-api
  CONTAINER_APP: ca-grailbabe-api-prod
  RESOURCE_GROUP: rg-grailbabedev-compute-prod-eus2
  PG_SERVER: pg-grailbabe-prod
  PG_FIREWALL_RULE: gh-actions-migrate-prod
  PROD_HEALTH_URL: https://grailbabe.com/api/healthz

concurrency:
  group: deploy-api-prod
  cancel-in-progress: false

jobs:
  resolve-sha:
    name: Resolve image SHA to promote
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pick.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Pick SHA
        id: pick
        run: |
          if [ -n "${{ inputs.dev_sha }}" ]; then
            SHA="${{ inputs.dev_sha }}"
          else
            SHA="${{ github.sha }}"
          fi
          echo "Promoting dev image SHA: $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  migrate:
    name: Run DB migrations (prod)
    needs: resolve-sha
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Azure Login
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" >/dev/null
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Get runner public IP
        id: ip
        run: |
          IP=$(curl -s https://api.ipify.org)
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Open Postgres firewall for runner (idempotent)
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --name "$PG_SERVER" \
            --rule-name "$PG_FIREWALL_RULE" \
            --yes >/dev/null 2>&1 || true
          az postgres flexible-server firewall-rule create \
            --resource-group "$RESOURCE_GROUP" \
            --name "$PG_SERVER" \
            --rule-name "$PG_FIREWALL_RULE" \
            --start-ip-address "${{ steps.ip.outputs.ip }}" \
            --end-ip-address "${{ steps.ip.outputs.ip }}" >/dev/null

      - name: Run migrations against PROD
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: pnpm --filter @workspace/db run migrate

      - name: Close Postgres firewall
        if: always()
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$RESOURCE_GROUP" \
            --name "$PG_SERVER" \
            --rule-name "$PG_FIREWALL_RULE" \
            --yes >/dev/null || true

  promote-and-deploy:
    name: Promote image & deploy (prod)
    needs: [resolve-sha, migrate]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure Login
        run: |
          az login --service-principal \
            -u "${{ secrets.AZURE_CLIENT_ID }}" \
            -p "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" >/dev/null
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Re-tag dev image as prod (ACR-side, no rebuild)
        run: |
          SHA="${{ needs.resolve-sha.outputs.sha }}"
          az acr import \
            --name acrgrailbabedevdev \
            --source ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$SHA \
            --image ${{ env.IMAGE_NAME }}:prod-$SHA \
            --force
          az acr import \
            --name acrgrailbabedevdev \
            --source ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$SHA \
            --image ${{ env.IMAGE_NAME }}:prod-latest \
            --force

      - name: Deploy prod Container App
        run: |
          SHA="${{ needs.resolve-sha.outputs.sha }}"
          az containerapp registry set \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --server ${{ env.REGISTRY }} \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" >/dev/null
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prod-$SHA

      - name: Smoke test prod
        run: |
          for i in {1..15}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_HEALTH_URL")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" = "200" ]; then exit 0; fi
            sleep 8
          done
          echo "Prod smoke test failed — $PROD_HEALTH_URL never returned 200"
          exit 1
